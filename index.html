<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Study Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1120; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .note-card { border-left: 4px solid #3b82f6; transition: 0.3s; }
        .note-card:hover { transform: translateY(-3px); background: rgba(51, 65, 85, 0.5); }
        .clean-terminal { background: #000; border: 1px solid #334155; font-family: monospace; }
    </style>
</head>
<body class="p-6 max-w-[1200px] mx-auto">

    <header class="mb-10 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">DevOps Workspace</h1>
        <div class="text-xs text-slate-500">Mariya's Study Lab v5.0</div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            <div class="glass p-6">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">📝 Quick Note Maker</h2>
                <div class="space-y-4">
                    <input type="text" id="noteTitle" placeholder="Topic (e.g. Docker, Git...)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                    <textarea id="noteContent" rows="3" placeholder="Write your note here..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500"></textarea>
                    <button onclick="saveNote()" class="bg-blue-600 hover:bg-blue-700 w-full py-2.5 rounded-lg font-bold text-sm transition">SAVE TO MY NOTES</button>
                </div>
            </div>

            <div id="notesContainer" class="space-y-4">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mt-8">Recent Notes</h3>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            
            <div class="clean-terminal rounded-xl overflow-hidden">
                <div class="bg-slate-900 px-4 py-2 text-[10px] text-slate-500 border-b border-slate-800">EASY_TERMINAL</div>
                <div class="p-4 h-[200px] overflow-y-auto text-xs" id="termLog">
                    <p class="text-green-500">Welcome, Future Engineer!</p>
                    <p class="text-slate-400 mt-2">Type commands below to practice...</p>
                </div>
                <div class="p-3 bg-black flex gap-2 items-center border-t border-slate-900">
                    <span class="text-green-500 text-xs">$</span>
                    <input type="text" id="termInput" placeholder="try 'ls' or 'pwd'..." class="bg-transparent border-none outline-none text-white text-xs flex-1">
                </div>
            </div>

            <div class="glass p-6">
                <h3 class="text-sm font-bold mb-4">📜 Essential Commands</h3>
                <div class="space-y-2">
                    <div onclick="copyThis('ls -la')" class="flex justify-between p-2 bg-slate-800/50 rounded cursor-pointer hover:bg-slate-700 text-xs">
                        <code class="text-blue-400">ls -la</code>
                        <span class="text-slate-500">List all</span>
                    </div>
                    <div onclick="copyThis('mkdir folder')" class="flex justify-between p-2 bg-slate-800/50 rounded cursor-pointer hover:bg-slate-700 text-xs">
                        <code class="text-blue-400">mkdir</code>
                        <span class="text-slate-500">Create Folder</span>
                    </div>
                    <div onclick="copyThis('git status')" class="flex justify-between p-2 bg-slate-800/50 rounded cursor-pointer hover:bg-slate-700 text-xs">
                        <code class="text-orange-400">git status</code>
                        <span class="text-slate-500">Check Git</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Note Making Logic
        function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            if(!title || !content) return alert("Please fill both fields");

            const note = { title, content, id: Date.now() };
            let notes = JSON.parse(localStorage.getItem('devops_notes') || '[]');
            notes.unshift(note);
            localStorage.setItem('devops_notes', JSON.stringify(notes));
            
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            renderNotes();
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            const notes = JSON.parse(localStorage.getItem('devops_notes') || '[]');
            container.innerHTML = '<h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mt-8">Recent Notes</h3>';
            
            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = "glass p-4 note-card flex justify-between items-start";
                div.innerHTML = `
                    <div>
                        <h4 class="text-blue-400 font-bold text-sm">${n.title}</h4>
                        <p class="text-xs text-slate-400 mt-1">${n.content}</p>
                    </div>
                    <button onclick="deleteNote(${n.id})" class="text-red-500 text-[10px] font-bold">DELETE</button>
                `;
                container.appendChild(div);
            });
        }

        function deleteNote(id) {
            let notes = JSON.parse(localStorage.getItem('devops_notes') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('devops_notes', JSON.stringify(notes));
            renderNotes();
        }

        // Terminal Logic
        const termInput = document.getElementById('termInput');
        termInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const cmd = termInput.value;
                const log = document.getElementById('termLog');
                const p = document.createElement('p');
                p.className = "mt-1";
                p.innerHTML = `<span class="text-green-500">$</span> ${cmd}`;
                log.appendChild(p);
                
                // Simple Responses
                const res = document.createElement('p');
                res.className = "text-blue-400 mb-2";
                if(cmd === 'ls') res.innerText = "notes/  commands/  lab_config.yml";
                else if(cmd === 'pwd') res.innerText = "/home/mariya/devops";
                else res.innerText = "Command executed successfully.";
                
                log.appendChild(res);
                termInput.value = '';
                log.scrollTop = log.scrollHeight;
            }
        });

        function copyThis(text) {
            navigator.clipboard.writeText(text);
            alert("Copied: " + text);
        }

        window.onload = renderNotes;
    </script>
</body>
</html>
