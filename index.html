<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pro Lab | Mariya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; scroll-behavior: smooth; }
        
        /* Premium Aesthetics */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; transition: all 0.4s ease; }
        .glass:hover { border-color: rgba(59, 130, 246, 0.4); transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* Dynamic Themes for Notes */
        .card-linux { border-left: 5px solid #10b981; background: linear-gradient(135deg, rgba(16,185,129,0.1), transparent); }
        .card-git { border-left: 5px solid #f97316; background: linear-gradient(135deg, rgba(249,115,22,0.1), transparent); }
        .card-docker { border-left: 5px solid #38bdf8; background: linear-gradient(135deg, rgba(56,189,248,0.1), transparent); }
        .card-aws { border-left: 5px solid #fbbf24; background: linear-gradient(135deg, rgba(251,191,36,0.1), transparent); }
        .card-cicd { border-left: 5px solid #ec4899; background: linear-gradient(135deg, rgba(236,72,153,0.1), transparent); }
        .card-other { border-left: 5px solid #64748b; background: linear-gradient(135deg, rgba(100,116,139,0.1), transparent); }

        .progress-bar { height: 4px; border-radius: 10px; background: #1e293b; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-[1700px] mx-auto">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-16 gap-8">
        <div class="space-y-2">
            <h1 class="text-4xl font-black tracking-tighter text-blue-500 italic">DEVOPS.ELITE</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> MARIYA'S WORKSPACE v8.0
            </p>
        </div>

        <div class="glass px-8 py-4 flex gap-8 items-center border-white/5">
            <div class="text-center">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Total Progress</p>
                <div class="progress-bar w-32"><div id="totalProgress" class="progress-fill bg-blue-500" style="width: 35%"></div></div>
            </div>
            <div class="h-10 w-px bg-white/10"></div>
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <p class="text-xs font-bold text-white">Mariya</p>
                    <p class="text-[9px] text-blue-400 font-mono italic">Future Cloud Engineer</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-blue-600 to-purple-600 p-0.5">
                    <div class="w-full h-full rounded-full bg-slate-900 flex items-center justify-center text-xl">👩‍🚀</div>
                </div>
            </div>
        </div>
    </header>

    <section class="mb-20">
        <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em] mb-8">Live Project Deployment Gallery</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 border-l-4 border-blue-500 flex justify-between items-center group">
                <div>
                    <h4 class="font-bold text-sm">justweb.com</h4>
                    <p class="text-[10px] text-slate-500">Static Site • GitHub Pages</p>
                </div>
                <a href="#" class="text-xs font-bold text-blue-400 group-hover:underline">LIVE →</a>
            </div>
            <div class="glass p-6 border-l-4 border-purple-500 flex justify-between items-center group opacity-50">
                <div>
                    <h4 class="font-bold text-sm">docker-app-v1</h4>
                    <p class="text-[10px] text-slate-500">Containerized • Building...</p>
                </div>
                <span class="text-[9px] font-bold text-slate-600">PENDING</span>
            </div>
            <div class="glass p-6 border-dashed border-2 border-slate-800 flex items-center justify-center text-slate-600 cursor-pointer hover:border-blue-500 transition">
                <span class="text-xs font-bold">+ NEW DEPLOYMENT</span>
            </div>
        </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <div class="lg:col-span-4 space-y-8">
            <div class="glass p-8 space-y-6 sticky top-10 border-white/5 shadow-2xl">
                <h2 class="text-xl font-bold flex items-center gap-3">📝 Note Injector</h2>
                <div class="space-y-4">
                    <select id="noteCat" class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 text-sm focus:border-blue-500 outline-none transition-all">
                        <option value="linux">🐧 Linux Shell</option>
                        <option value="git">🎋 Git Hub/Lab</option>
                        <option value="docker">🐋 Docker Container</option>
                        <option value="aws">☁️ AWS Services</option>
                        <option value="cicd">🔄 CI/CD Pipeline</option>
                        <option value="other">✨ Custom Project Note</option>
                    </select>
                    <input type="text" id="noteTitle" placeholder="Topic: e.g. S3 Static Hosting" class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-blue-500">
                    <textarea id="noteText" rows="5" placeholder="Commands or Logic..." class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-blue-500"></textarea>
                    
                    <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-xl border border-white/5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Set Revision Timer?</label>
                        <input type="checkbox" id="revTimer" class="w-4 h-4 accent-blue-500">
                    </div>

                    <button onclick="saveNote()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold text-xs tracking-widest transition-all active:scale-95 shadow-xl shadow-blue-500/20">SAVE RECORD</button>
                </div>
            </div>

            <div class="glass p-6">
                <h4 class="text-[10px] font-bold text-orange-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="animate-pulse">⏳</span> Pending Practice
                </h4>
                <div id="revisionList" class="space-y-3">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-black italic tracking-tighter">DATA_RECORDS</h3>
                <input type="text" id="search" onkeyup="filterNotes()" placeholder="Search archive..." class="bg-white/5 border border-white/10 rounded-full px-6 py-2 text-xs outline-none focus:border-blue-500 w-64">
            </div>
            
            <div id="notesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>
    </div>

    <script>
        function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const cat = document.getElementById('noteCat').value;
            const text = document.getElementById('noteText').value;
            const needsRev = document.getElementById('revTimer').checked;

            if(!title || !text) return;

            const note = { title, cat, text, needsRev, id: Date.now(), date: new Date().toLocaleDateString() };
            let notes = JSON.parse(localStorage.getItem('mariya_elite_v8') || '[]');
            notes.unshift(note);
            localStorage.setItem('mariya_elite_v8', JSON.stringify(notes));

            // Reset UI
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteText').value = '';
            document.getElementById('revTimer').checked = false;
            renderAll();
        }

        function renderAll() {
            const grid = document.getElementById('notesGrid');
            const revList = document.getElementById('revisionList');
            const notes = JSON.parse(localStorage.getItem('mariya_elite_v8') || '[]');
            
            grid.innerHTML = '';
            revList.innerHTML = '';

            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = `glass p-6 card-${n.cat} flex flex-col group`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">${n.date}</span>
                        <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="copyTxt('${n.text.replace(/'/g, "\\'")}')" class="text-[9px] font-bold text-blue-400 uppercase">Copy</button>
                            <button onclick="deleteNote(${n.id})" class="text-[9px] font-bold text-red-500 uppercase">Purge</button>
                        </div>
                    </div>
                    <h4 class="font-bold text-white text-md mb-2">${n.title}</h4>
                    <p class="text-xs text-slate-400 leading-relaxed mb-8 flex-grow italic opacity-70">${n.text}</p>
                    <div class="flex justify-between items-center mt-auto pt-4 border-t border-white/5">
                        <span class="text-[9px] font-black text-blue-500/60 uppercase tracking-widest">${n.cat} Unit</span>
                        ${n.needsRev ? '<span class="text-[8px] bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded font-bold">PRACTICE REQUIRED</span>' : ''}
                    </div>
                `;
                grid.appendChild(div);

                if(n.needsRev) {
                    const rItem = document.createElement('div');
                    rItem.className = "p-3 bg-white/5 border border-white/5 rounded-xl text-[10px] flex justify-between items-center";
                    rItem.innerHTML = `<span class="font-bold opacity-80">${n.title}</span> <button onclick="markDone(${n.id})" class="text-blue-400 font-bold">DONE</button>`;
                    revList.appendChild(rItem);
                }
            });

            if(revList.innerHTML === '') revList.innerHTML = '<p class="text-[9px] text-slate-600 italic">Systems clear. No pending practice.</p>';
            updateProgress(notes.length);
        }

        function markDone(id) {
            let notes = JSON.parse(localStorage.getItem('mariya_elite_v8') || '[]');
            notes = notes.map(n => n.id === id ? {...n, needsRev: false} : n);
            localStorage.setItem('mariya_elite_v8', JSON.stringify(notes));
            renderAll();
        }

        function deleteNote(id) {
            if(!confirm("Purge data?")) return;
            let notes = JSON.parse(localStorage.getItem('mariya_elite_v8') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('mariya_elite_v8', JSON.stringify(notes));
            renderAll();
        }

        function updateProgress(count) {
            const bar = document.getElementById('totalProgress');
            let progress = Math.min(count * 5, 100); // 5% per note for visualization
            bar.style.width = progress + '%';
        }

        function filterNotes() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#notesGrid > div').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function copyTxt(txt) {
            navigator.clipboard.writeText(txt);
            alert("Data Extracted! 📋");
        }

        window.onload = renderAll;
    </script>
</body>
</html>
