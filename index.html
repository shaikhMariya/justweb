<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pro Lab | Mariya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; transition: 0.4s; }
        .glass:hover { border-color: rgba(59, 130, 246, 0.5); transform: translateY(-5px); }
        
        /* Topic Based Aesthetic Backgrounds */
        .card-linux { border-top: 5px solid #22c55e; background: linear-gradient(to bottom, rgba(34,197,94,0.1), transparent); }
        .card-git { border-top: 5px solid #f97316; background: linear-gradient(to bottom, rgba(249,115,22,0.1), transparent); }
        .card-docker { border-top: 5px solid #0ea5e9; background: linear-gradient(to bottom, rgba(14,165,233,0.1), transparent); }
        .card-k8s { border-top: 5px solid #326ce5; background: linear-gradient(to bottom, rgba(50,108,229,0.1), transparent); }
        .card-aws { border-top: 5px solid #ff9900; background: linear-gradient(to bottom, rgba(255,153,0,0.1), transparent); }
        .card-cicd { border-top: 5px solid #ec4899; background: linear-gradient(to bottom, rgba(236,72,153,0.1), transparent); }
        .card-other { border-top: 5px solid #64748b; background: linear-gradient(to bottom, rgba(100,116,139,0.1), transparent); }

        .roadmap-node { transition: 0.3s; cursor: pointer; }
        .roadmap-node:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
<body class="p-6 md:p-12 max-w-[1600px] mx-auto">

    <header class="flex flex-col lg:flex-row justify-between items-center mb-16 gap-8">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500">DEVOPS.CORE</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em]">Future Engineer • Mariya</p>
        </div>
        <div class="glass px-8 py-4 flex items-center gap-6 border-blue-500/20 shadow-2xl">
            <div class="text-left">
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Daily Practice Task</p>
                <p id="dailyTask" class="text-sm font-semibold italic">Loading your mission...</p>
            </div>
            <div class="h-10 w-px bg-slate-800"></div>
            <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-2xl">👩‍🚀</div>
        </div>
    </header>

    <section class="mb-20">
        <h3 class="text-center text-[10px] font-bold text-slate-500 uppercase tracking-[0.6em] mb-12">Industrial Learning Path (A to Z)</h3>
        <div class="flex flex-wrap justify-center gap-8 relative">
            <div class="roadmap-node flex flex-col items-center gap-3">
                <div class="w-16 h-16 glass rounded-2xl flex items-center justify-center border-green-500 text-3xl">🐧</div>
                <span class="text-[10px] font-bold text-green-500">LINUX</span>
            </div>
            <div class="roadmap-node flex flex-col items-center gap-3">
                <div class="w-16 h-16 glass rounded-2xl flex items-center justify-center border-orange-500 text-3xl">🎋</div>
                <span class="text-[10px] font-bold text-orange-400">GIT</span>
            </div>
            <div class="roadmap-node flex flex-col items-center gap-3">
                <div class="w-16 h-16 glass rounded-2xl flex items-center justify-center border-blue-400 text-3xl">🐋</div>
                <span class="text-[10px] font-bold text-blue-400">DOCKER</span>
            </div>
            <div class="roadmap-node flex flex-col items-center gap-3">
                <div class="w-16 h-16 glass rounded-2xl flex items-center justify-center border-purple-500 text-3xl">☸️</div>
                <span class="text-[10px] font-bold text-purple-400">K8S</span>
            </div>
            <div class="roadmap-node flex flex-col items-center gap-3">
                <div class="w-16 h-16 glass rounded-2xl flex items-center justify-center border-pink-500 text-3xl">🔄</div>
                <span class="text-[10px] font-bold text-pink-400">CI/CD</span>
            </div>
            <div class="roadmap-node flex flex-col items-center gap-3">
                <div class="w-16 h-16 glass rounded-2xl flex items-center justify-center border-yellow-500 text-3xl">☁️</div>
                <span class="text-[10px] font-bold text-yellow-400">AWS</span>
            </div>
        </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
        <div class="lg:col-span-4">
            <div class="glass p-10 space-y-8 sticky top-10 border-white/5 shadow-2xl">
                <h2 class="text-2xl font-bold flex items-center gap-3">📝 Note Injector</h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Target Module</label>
                        <select id="noteCat" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-sm focus:border-blue-500 outline-none cursor-pointer transition-all">
                            <option value="linux">🐧 Linux OS</option>
                            <option value="git">🎋 Git Version Control</option>
                            <option value="docker">🐋 Docker Containerization</option>
                            <option value="k8s">☸️ Kubernetes (K8s)</option>
                            <option value="aws">☁️ AWS Cloud Services</option>
                            <option value="cicd">🔄 CI/CD Automation</option>
                            <option value="other">✨ Extra / Custom Notes</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Note Title</label>
                        <input type="text" id="noteTitle" placeholder="e.g. Docker Volumes" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-sm focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Learning Content</label>
                        <textarea id="noteText" rows="6" placeholder="Document your logic here..." class="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-sm focus:border-blue-500 outline-none resize-none"></textarea>
                    </div>
                    <button onclick="saveNote()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-xs tracking-[0.2em] shadow-xl shadow-blue-500/20 active:scale-95 transition-all">
                        STABILIZE RECORD
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <h3 class="text-3xl font-black italic tracking-tighter">DATA_ARCHIVE</h3>
                <input type="text" id="search" onkeyup="filterNotes()" placeholder="Search neural records..." class="bg-white/5 border border-white/10 rounded-full px-8 py-3 text-xs outline-none focus:border-blue-500 w-72">
            </div>
            
            <div id="notesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </div>
    </div>

    <script>
        const dailyTasks = [
            "Linux: Learn how 'SSH Keys' work for secure access.",
            "Docker: Containerize a simple HTML site today.",
            "Git: Understand 'git rebase' vs 'git merge'.",
            "AWS: Setup an EC2 instance and login via Terminal.",
            "CI/CD: Explain 'Build, Test, Deploy' flow.",
            "Linux: Practice 'chmod' permissions on files.",
            "Docker: Try 'docker-compose' for 2 containers."
        ];

        const icons = { linux: '🐧', git: '🎋', docker: '🐋', k8s: '☸️', aws: '☁️', cicd: '🔄', other: '✨' };

        function init() {
            document.getElementById('dailyTask').innerText = dailyTasks[new Date().getDate() % dailyTasks.length];
            renderNotes();
        }

        function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const cat = document.getElementById('noteCat').value;
            const text = document.getElementById('noteText').value;

            if(!title || !text) return alert("Pehle content toh bharo!");

            const note = { title, cat, text, id: Date.now(), date: new Date().toLocaleDateString() };
            let notes = JSON.parse(localStorage.getItem('mariya_pro_final_v9') || '[]');
            notes.unshift(note);
            localStorage.setItem('mariya_pro_final_v9', JSON.stringify(notes));

            // Reset UI
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteText').value = '';
            renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const notes = JSON.parse(localStorage.getItem('mariya_pro_final_v9') || '[]');
            grid.innerHTML = '';

            if(notes.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-32 text-center opacity-20 font-black tracking-[0.5em] text-2xl uppercase">Archive Empty</div>';
                return;
            }

            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = `glass p-8 card-${n.cat} flex flex-col group`;
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-2xl">${icons[n.cat]}</div>
                        <div class="flex gap-4">
                            <button onclick="copyContent('${n.text.replace(/'/g, "\\'")}')" class="text-[9px] font-black text-slate-500 hover:text-white uppercase tracking-widest">Copy</button>
                            <button onclick="deleteNote(${n.id})" class="text-[9px] font-black text-slate-500 hover:text-red-500 uppercase tracking-widest">Delete</button>
                        </div>
                    </div>
                    <h4 class="font-bold text-white text-xl mb-4 tracking-tight leading-tight uppercase">${n.title}</h4>
                    <p class="text-xs text-slate-400 leading-relaxed mb-10 flex-grow italic opacity-80 whitespace-pre-wrap">${n.text}</p>
                    <div class="mt-auto pt-6 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${n.cat} module</span>
                        <span class="text-[9px] text-slate-600 font-bold italic">${n.date}</span>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function deleteNote(id) {
            let notes = JSON.parse(localStorage.getItem('mariya_pro_final_v9') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('mariya_pro_final_v9', JSON.stringify(notes));
            renderNotes();
        }

        function filterNotes() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#notesGrid > div').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function copyContent(txt) {
            navigator.clipboard.writeText(txt);
            alert("Data Extracted! 📋");
        }

        window.onload = init;
    </script>
</body>
</html>
