<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps CMD Dashboard</title>

<style>

body{
font-family:Segoe UI;
background:#020b12;
color:#cfefff;
margin:0;
padding:30px;
}

h2{
color:#00e1ff;
letter-spacing:2px;
}

.container{
display:grid;
grid-template-columns:300px 1fr 300px;
gap:20px;
}

.card{
background:#071a23;
border-radius:12px;
padding:20px;
box-shadow:0 0 15px rgba(0,255,255,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(0,255,255,.25);
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
background:#031018;
border:1px solid #0c3645;
color:white;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#00e1ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.archive-card{
background:#0b2430;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.skill-bar{
height:6px;
background:#0b1e28;
border-radius:10px;
margin-top:8px;
overflow:hidden;
}

.skill-bar span{
display:block;
height:100%;
width:0;
background:#00e1ff;
transition:width 1.5s ease;
}

.terminal{
background:#01070c;
padding:15px;
border-radius:10px;
font-family:monospace;
color:#00ff9f;
margin-top:10px;
}

.column{
min-height:150px;
background:#04131b;
padding:10px;
border-radius:10px;
}

.task{
background:#0a2733;
padding:10px;
margin:8px 0;
border-radius:8px;
cursor:grab;
}

.modules{
display:flex;
gap:10px;
margin-bottom:20px;
}

.module{
padding:10px 15px;
background:#071a23;
border-radius:8px;
cursor:pointer;
}

.module:hover{
background:#0a2b3a;
}

</style>
</head>

<body>

<h2>DEVOPS_CMD</h2>

<div class="modules">
<div class="module" data-module="linux">Linux</div>
<div class="module" data-module="git">Git</div>
<div class="module" data-module="docker">Docker</div>
<div class="module" data-module="k8s">Kubernetes</div>
<div class="module" data-module="aws">AWS</div>
</div>

<div class="container">

<div class="card">

<h3>Note Injector</h3>

<select id="module">
<option value="linux">Linux</option>
<option value="git">Git</option>
<option value="docker">Docker</option>
<option value="k8s">Kubernetes</option>
<option value="aws">AWS</option>
</select>

<input id="noteTitle" placeholder="Note title">

<textarea id="noteContent" rows="5" placeholder="Write learning notes"></textarea>

<button id="saveBtn">SAVE DATA</button>

</div>

<div class="card">

<h3>DATA ARCHIVE</h3>

<input id="search" placeholder="search archive">

<div id="archive"></div>

</div>

<div class="card">

<h3>Skill Levels</h3>

Linux
<div class="skill-bar"><span data-value="90"></span></div>

Docker
<div class="skill-bar"><span data-value="60"></span></div>

Kubernetes
<div class="skill-bar"><span data-value="30"></span></div>

<h3>Terminal</h3>

<div class="terminal" id="terminalText"></div>

</div>

</div>

<br><br>

<h3>DevOps Project Tracker</h3>

<div class="container">

<div class="column" id="todo">
<h4>To Learn</h4>
<div class="task" draggable="true">Kubernetes Pods</div>
<div class="task" draggable="true">Terraform</div>
</div>

<div class="column" id="learning">
<h4>Learning</h4>
<div class="task" draggable="true">Docker Volumes</div>
</div>

<div class="column" id="done">
<h4>Completed</h4>
<div class="task" draggable="true">Linux Commands</div>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",function(){

const saveBtn=document.querySelector("#saveBtn")
const titleInput=document.querySelector("#noteTitle")
const contentInput=document.querySelector("#noteContent")
const moduleSelect=document.querySelector("#module")
const archive=document.querySelector("#archive")
const search=document.querySelector("#search")

saveBtn.addEventListener("click",()=>{

const title=titleInput.value.trim()
const content=contentInput.value.trim()
const module=moduleSelect.value

if(title===""||content==="") return

const card=document.createElement("div")
card.classList.add("archive-card")
card.dataset.module=module

card.innerHTML=`
<h4>${title}</h4>
<p>${content}</p>
<small>${module}</small>
`

archive.prepend(card)

titleInput.value=""
contentInput.value=""

})

search.addEventListener("input",()=>{

const term=search.value.toLowerCase()
const notes=document.querySelectorAll(".archive-card")

notes.forEach(note=>{

note.style.display=
note.innerText.toLowerCase().includes(term)
?"block":"none"

})

})

const skills=document.querySelectorAll(".skill-bar span")

skills.forEach(bar=>{

const value=bar.dataset.value

setTimeout(()=>{
bar.style.width=value+"%"
},300)

})

const text="Initializing DevOps Command Center..."
const terminal=document.querySelector("#terminalText")

let i=0

function typing(){

if(i<text.length){
terminal.innerHTML+=text.charAt(i)
i++
setTimeout(typing,40)
}

}

typing()

const cards=document.querySelectorAll(".task")
const columns=document.querySelectorAll(".column")

cards.forEach(card=>{

card.addEventListener("dragstart",()=>{
card.classList.add("dragging")
})

card.addEventListener("dragend",()=>{
card.classList.remove("dragging")
})

})

columns.forEach(col=>{

col.addEventListener("dragover",(e)=>{
e.preventDefault()

const card=document.querySelector(".dragging")
if(card) col.appendChild(card)

})

})

})

</script>

</body>
</html>
