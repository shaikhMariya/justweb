<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Elite v27 | Mariya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --accent: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .screen { display: none; opacity: 0; }
        .screen.active { display: flex !important; flex-direction: column; opacity: 1; height: 100%; overflow-y: auto; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item { cursor: pointer; transition: 0.3s; color: #94a3b8; border-left: 3px solid transparent; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-left: 3px solid #3b82f6; font-weight: 700; }
        .pdf-frame { width: 100%; height: calc(100vh - 150px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex h-screen w-full">

    <aside class="w-72 bg-[#050b14] border-r border-slate-800 flex flex-col p-6 h-full z-50">
        <div class="glass p-4 mb-8 flex items-center gap-3 border-white/5">
            <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-xl">👩‍🚀</div>
            <div><h2 class="text-xs font-black uppercase tracking-widest text-white">Admin Mariya</h2><p class="text-[8px] text-emerald-400 font-mono">OS_CONNECTED</p></div>
        </div>
        <nav class="flex-grow space-y-2">
            <div class="nav-item active p-4 rounded-xl text-sm flex items-center gap-3" onclick="switchTab('dashboard', this)"><span>📊</span> Dashboard</div>
            <div class="nav-item p-4 rounded-xl text-sm flex items-center gap-3" onclick="switchTab('ai', this)"><span>🤖</span> AI Assistant</div>
            <div class="nav-item p-4 rounded-xl text-sm flex items-center gap-3" onclick="switchTab('vault', this)"><span>🔐</span> Command Vault</div>
            <div class="nav-item p-4 rounded-xl text-sm flex items-center gap-3" onclick="switchTab('library', this)"><span>📚</span> PDF Library</div>
        </nav>
    </aside>

    <main class="flex-grow bg-[#020617] h-full flex flex-col relative overflow-hidden">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-10 flex-shrink-0">
            <span class="text-[10px] text-slate-500 font-mono tracking-widest uppercase">System Status: Optimal</span>
            <p id="timerDisplay" class="text-xl font-mono font-black text-blue-400">25:00</p>
        </header>

        <div class="flex-grow p-10 overflow-hidden relative">
            
            <div id="dashboard" class="screen active">
                <h2 class="text-4xl font-black mb-10 italic">Telemetry Center</h2>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 glass p-8 border-l-4 border-blue-500">
                        <div class="flex justify-between mb-4"><h3 class="font-bold text-xs uppercase text-slate-400">Knowledge Saturation</h3><span class="font-black text-blue-400 text-3xl">35%</span></div>
                        <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div class="h-full bg-blue-500 w-[35%]"></div></div>
                    </div>
                </div>
            </div>

            <div id="library" class="screen">
                <h2 class="text-3xl font-black mb-10 italic text-purple-400">PDF_LIBRARY</h2>
                <div id="pdfGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
                    </div>
            </div>

            <div id="pdfViewer" class="screen">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="viewerTitle" class="text-xl font-bold italic text-blue-400 uppercase">Reading Mode</h2>
                    <button onclick="switchTab('library', document.querySelector('[onclick*=\'library\']'))" class="bg-red-600/20 text-red-500 px-6 py-2 rounded-xl text-xs font-bold border border-red-500/30">CLOSE READER</button>
                </div>
                <iframe id="pdfFrame" class="pdf-frame" src=""></iframe>
            </div>

            <div id="ai" class="screen"> </div>
            <div id="vault" class="screen"> </div>

        </div>
    </main>

    <script>
        // PDF Data
        const pdfs = [
            { id: 1, title: 'The Linux Command Line', link: 'https://www.kea.nu/files/textbooks/humblesec/thelinuxcommandline.pdf' },
            { id: 2, title: 'Docker Guide', link: 'https://kodekloud.com/wp-content/uploads/2021/10/Docker-for-Beginners-Mumshad-Mannambeth.pdf' },
            { id: 3, title: 'Git Official Guide', link: 'https://groundwater.usu.edu/assets/pdf/How_to_Git.pdf' }
        ];

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => { s.style.display = 'none'; s.classList.remove('active'); });
            const target = document.getElementById(id);
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 10);
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        // --- NEW: Internal PDF Opener ---
        function openInAppPDF(title, link) {
            document.getElementById('viewerTitle').innerText = `Reading: ${title}`;
            document.getElementById('pdfFrame').src = link;
            switchTab('pdfViewer'); // Switch to the internal viewer screen
        }

        function renderLibrary() {
            document.getElementById('pdfGrid').innerHTML = pdfs.map(p => `
                <div class="glass p-8 text-center border-b-4 border-purple-500/30">
                    <div class="text-4xl mb-4">📚</div>
                    <h4 class="text-sm font-bold text-white mb-6 h-10 overflow-hidden">${p.title}</h4>
                    <button onclick="openInAppPDF('${p.title}', '${p.link}')" class="w-full bg-purple-600/20 text-purple-400 py-3 rounded-xl text-[10px] font-bold border border-purple-500/20 hover:bg-purple-600 hover:text-white transition">OPEN INSIDE WEB</button>
                </div>
            `).join('');
        }

        window.onload = () => {
            renderLibrary();
            switchTab('dashboard', document.querySelector('.nav-item'));
        };
    </script>
</body>
</html>
