<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Notebook</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#06131b;
color:white;
}

header{
padding:15px 25px;
font-size:20px;
letter-spacing:2px;
color:#00e1ff;
border-bottom:1px solid #0b2734;
}

.container{
display:grid;
grid-template-columns:240px 1fr 280px;
height:calc(100vh - 60px);
}

/* SIDEBAR */

.sidebar{
background:#081c25;
padding:20px;
overflow:auto;
}

.sidebar h3{
color:#00e1ff;
margin-bottom:10px;
}

.topic{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.topic:hover{
background:#0f2c3a;
}

/* MAIN NOTES */

.main{
padding:25px;
overflow:auto;
}

.main input{
width:100%;
padding:10px;
margin-bottom:10px;
background:#0a202a;
border:none;
color:white;
border-radius:6px;
}

.main textarea{
width:100%;
height:60vh;
background:#0a202a;
border:none;
padding:15px;
color:white;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px 15px;
background:#00e1ff;
border:none;
border-radius:6px;
cursor:pointer;
}

/* RIGHT PANEL */

.right{
background:#081c25;
padding:20px;
overflow:auto;
}

.card{
background:#0d2633;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.command{
background:#06131b;
padding:6px;
margin:4px 0;
border-radius:6px;
font-family:monospace;
}

.skill-bar{
height:6px;
background:#06131b;
margin-top:5px;
border-radius:6px;
overflow:hidden;
}

.skill-bar span{
display:block;
height:100%;
background:#00e1ff;
width:0;
transition:1s;
}

</style>
</head>

<body>

<header>DEVOPS NOTEBOOK</header>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Topics</h3>

<div class="topic">Linux</div>
<div class="topic">Git</div>
<div class="topic">Docker</div>
<div class="topic">Kubernetes</div>
<div class="topic">AWS</div>

</div>

<!-- MAIN NOTES -->

<div class="main">

<input id="title" placeholder="Note title">

<textarea id="note"></textarea>

<button onclick="saveNote()">Save Note</button>

<div id="saved"></div>

</div>

<!-- RIGHT PANEL -->

<div class="right">

<div class="card">

<h4>Command Vault</h4>

<div class="command">ls</div>
<div class="command">chmod 777 file</div>
<div class="command">docker ps</div>
<div class="command">docker build -t app</div>
<div class="command">kubectl get pods</div>

</div>

<div class="card">

<h4>Progress</h4>

Linux
<div class="skill-bar"><span data-value="80"></span></div>

Docker
<div class="skill-bar"><span data-value="60"></span></div>

Kubernetes
<div class="skill-bar"><span data-value="30"></span></div>

</div>

<div class="card">

<h4>Daily Practice</h4>

<div id="task">Practice docker containers</div>

<button onclick="nextTask()">Next Task</button>

</div>

</div>

</div>

<script>

function saveNote(){

let title=document.getElementById("title").value
let note=document.getElementById("note").value

if(title==""||note=="") return

let div=document.createElement("div")

div.className="card"

div.innerHTML="<h4>"+title+"</h4><p>"+note+"</p>"

document.getElementById("saved").prepend(div)

}

const bars=document.querySelectorAll(".skill-bar span")

bars.forEach(bar=>{
let value=bar.dataset.value
setTimeout(()=>{
bar.style.width=value+"%"
},300)
})

const tasks=[
"Practice docker containers",
"Create kubernetes pod",
"Write terraform script",
"Learn linux permissions"
]

let index=0

function nextTask(){

index=(index+1)%tasks.length

document.getElementById("task").innerText=tasks[index]

}

</script>

</body>
</html>
