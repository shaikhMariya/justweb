<!DOCTYPE html>
<html lang="en" class="dark">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevOps Command Center</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:"Space Grotesk",sans-serif;
background:#0A0E14;
color:white;
}

.glass{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(12px);
}

.page{
display:none;
}

.active{
display:block;
}

.chat-box{
height:200px;
overflow:auto;
background:#071a23;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.user{color:#00e1ff}
.ai{color:#7dffb3}

</style>

</head>



<body>



<!-- NAVBAR -->

<header class="glass p-4 flex justify-between">

<h1 class="text-cyan-400 font-bold text-xl">
DEVOPS_CMD
</h1>

<nav class="flex gap-6 text-sm">

<a onclick="showPage('dashboard')" class="cursor-pointer">COMMAND_CENTER</a>

<a onclick="showPage('terminalPage')" class="cursor-pointer">TERMINAL</a>

<a onclick="showPage('networkPage')" class="cursor-pointer">NETWORK_MAP</a>

<a onclick="showPage('logsPage')" class="cursor-pointer">SYSTEM_LOGS</a>

</nav>

</header>



<!-- DASHBOARD PAGE -->

<div id="dashboard" class="page active p-6 grid grid-cols-12 gap-6">



<!-- NOTES -->

<div class="col-span-3 glass p-5 rounded">

<h3 class="text-cyan-400 mb-3">NOTE INJECTOR</h3>

<input id="noteTitle" placeholder="Note title"
class="w-full p-2 mb-3 bg-black border rounded">

<textarea id="noteContent"
rows="4"
placeholder="Write note"
class="w-full p-2 mb-3 bg-black border rounded"></textarea>

<button onclick="saveNote()"
class="bg-cyan-400 text-black w-full py-2 rounded">
SAVE
</button>

</div>



<!-- ARCHIVE -->

<div class="col-span-6 glass p-5 rounded">

<h3 class="text-cyan-400 mb-4">DATA ARCHIVE</h3>

<div id="archive" class="space-y-3"></div>

</div>



<!-- AI -->

<div class="col-span-3 glass p-5 rounded">

<h3 class="text-cyan-400 mb-3">DevOps AI</h3>

<div id="chatBox" class="chat-box"></div>

<input id="aiInput"
placeholder="Ask AI..."
class="w-full p-2 bg-black border rounded">

<button onclick="askAI()"
class="mt-2 border w-full py-2">
ASK
</button>

</div>

</div>



<!-- TERMINAL PAGE -->

<div id="terminalPage" class="page p-6">

<div class="glass p-5 rounded max-w-xl">

<h2 class="text-cyan-400 mb-3">DevOps Terminal</h2>

<div id="terminalOutput"
class="bg-black p-3 h-60 overflow-auto font-mono text-green-400"></div>

<input id="terminalInput"
placeholder="type command..."
class="w-full p-2 bg-black border mt-3">

</div>

</div>



<!-- NETWORK PAGE -->

<div id="networkPage" class="page p-6">

<div class="glass p-6">

<h2 class="text-cyan-400 mb-4">Cloud Network Map</h2>

<p>AWS → Load Balancer → Kubernetes Cluster → Pods</p>

<p class="mt-2 text-gray-400 text-sm">
(This section can later show real cloud architecture)
</p>

</div>

</div>



<!-- LOGS PAGE -->

<div id="logsPage" class="page p-6">

<div class="glass p-6">

<h2 class="text-cyan-400 mb-4">System Logs</h2>

<div id="logs"></div>

</div>

</div>



<script>



/* PAGE SWITCH */

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}



/* NOTES SYSTEM */

function loadNotes(){

let notes=JSON.parse(localStorage.getItem("notes"))||[]

const archive=document.getElementById("archive")

archive.innerHTML=""

notes.forEach((note,i)=>{

archive.innerHTML+=`
<div class="glass p-3 rounded">
<h4 class="text-cyan-400">${note.title}</h4>
<p>${note.content}</p>
<button onclick="deleteNote(${i})"
class="text-red-400 text-xs mt-2">
delete
</button>
</div>
`

})

}

function saveNote(){

let title=document.getElementById("noteTitle").value
let content=document.getElementById("noteContent").value

if(title==""||content=="")return

let notes=JSON.parse(localStorage.getItem("notes"))||[]

notes.push({title,content})

localStorage.setItem("notes",JSON.stringify(notes))

loadNotes()

document.getElementById("noteTitle").value=""
document.getElementById("noteContent").value=""

log("Note saved")

}

function deleteNote(i){

let notes=JSON.parse(localStorage.getItem("notes"))

notes.splice(i,1)

localStorage.setItem("notes",JSON.stringify(notes))

loadNotes()

log("Note deleted")

}

loadNotes()



/* TERMINAL */

const terminalInput=document.getElementById("terminalInput")

terminalInput.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=this.value

let result="command not found"

if(cmd==="ls")
result="index.html dockerfile config.yaml"

if(cmd==="docker ps")
result="container nginx running"

if(cmd==="kubectl get pods")
result="pod running"

if(cmd==="git status")
result="working tree clean"

const output=document.getElementById("terminalOutput")

output.innerHTML+=`<div>> ${cmd}</div>`
output.innerHTML+=`<div>${result}</div>`

this.value=""

log("Terminal command: "+cmd)

}

})



/* AI */

function askAI(){

const input=document.getElementById("aiInput")
const chat=document.getElementById("chatBox")

let q=input.value.toLowerCase()

if(q==="")return

chat.innerHTML+=`<div class="user">You: ${q}</div>`

let answer="I don't know"

if(q.includes("docker"))
answer="docker run -d nginx"

if(q.includes("kubernetes"))
answer="kubectl get pods"

if(q.includes("terraform"))
answer="terraform apply"

if(q.includes("linux"))
answer="ls -la"

chat.innerHTML+=`<div class="ai">AI: ${answer}</div>`

chat.scrollTop=chat.scrollHeight

input.value=""

log("AI question asked")

}



/* LOG SYSTEM */

function log(text){

let logs=document.getElementById("logs")

logs.innerHTML+=`<div class="text-sm text-gray-400">
${new Date().toLocaleTimeString()} → ${text}
</div>`

}



</script>



</body>
</html>
