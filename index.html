<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Elite Lab | Mariya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .glow-card { border: 1px solid rgba(59, 130, 246, 0.4); box-shadow: 0 0 25px rgba(59, 130, 246, 0.1); }
        
        /* Category Themes */
        .theme-linux { border-left: 6px solid #22c55e; }
        .theme-git { border-left: 6px solid #f97316; }
        .theme-docker { border-left: 6px solid #0ea5e9; }
        .theme-k8s { border-left: 6px solid #326ce5; }
        .theme-cicd { border-left: 6px solid #a855f7; }
        .theme-terraform { border-left: 6px solid #5c4ee5; }
        .theme-aws { border-left: 6px solid #ff9900; }
        .theme-monitoring { border-left: 6px solid #e11d48; }
        .theme-python { border-left: 6px solid #ffd43b; }
        .theme-bash { border-left: 6px solid #4ade80; }
        .theme-custom { border-left: 6px solid #64748b; }

        .roadmap-node { transition: all 0.3s ease; cursor: pointer; }
        .roadmap-node:hover { transform: translateY(-5px) scale(1.1); filter: drop-shadow(0 0 10px currentColor); }
    </style>
</head>
<body class="p-4 md:p-10 max-w-[1600px] mx-auto">

    <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl shadow-xl shadow-blue-500/20">🚀</div>
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">DevOps Mastery Lab</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.4em]">Mariya • Pro Deployment Engineer</p>
            </div>
        </div>
        <div class="glass px-6 py-3 flex items-center gap-6">
            <div class="text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Today's Mission</p>
                <p id="dailyMission" class="text-xs font-semibold text-blue-400">Loading...</p>
            </div>
            <div class="h-8 w-px bg-slate-800"></div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-400 border-2 border-slate-700"></div>
        </div>
    </header>

    <section class="mb-16 glass p-8 overflow-x-auto">
        <h3 class="text-center text-[10px] font-bold text-slate-500 uppercase tracking-[0.5em] mb-10">The Ultimate DevOps Roadmap</h3>
        <div class="flex justify-between items-center min-w-[1000px] relative px-10">
            <div class="absolute h-0.5 bg-slate-800 w-[90%] left-1/2 -translate-x-1/2 -z-10"></div>
            
            <div class="roadmap-node text-green-400 flex flex-col items-center gap-2" title="Linux & Bash">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-green-500/50">🐧</div>
                <span class="text-[9px] font-bold">LINUX</span>
            </div>
            <div class="roadmap-node text-orange-500 flex flex-col items-center gap-2" title="Git">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-orange-500/50">🎋</div>
                <span class="text-[9px] font-bold">GIT</span>
            </div>
            <div class="roadmap-node text-yellow-400 flex flex-col items-center gap-2" title="Python">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-yellow-400/50">🐍</div>
                <span class="text-[9px] font-bold">PYTHON</span>
            </div>
            <div class="roadmap-node text-blue-400 flex flex-col items-center gap-2" title="Docker">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-blue-400/50">🐋</div>
                <span class="text-[9px] font-bold">DOCKER</span>
            </div>
            <div class="roadmap-node text-blue-600 flex flex-col items-center gap-2" title="Kubernetes">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-blue-600/50">☸️</div>
                <span class="text-[9px] font-bold">K8S</span>
            </div>
            <div class="roadmap-node text-purple-500 flex flex-col items-center gap-2" title="CI/CD">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-purple-500/50">🔄</div>
                <span class="text-[9px] font-bold">CI/CD</span>
            </div>
            <div class="roadmap-node text-indigo-400 flex flex-col items-center gap-2" title="Terraform">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-indigo-400/50">🏗️</div>
                <span class="text-[9px] font-bold">TF</span>
            </div>
            <div class="roadmap-node text-orange-400 flex flex-col items-center gap-2" title="AWS">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-orange-400/50">☁️</div>
                <span class="text-[9px] font-bold">AWS</span>
            </div>
            <div class="roadmap-node text-red-500 flex flex-col items-center gap-2" title="Monitoring">
                <div class="w-12 h-12 glass rounded-xl flex items-center justify-center border-red-500/50">📊</div>
                <span class="text-[9px] font-bold">MONITOR</span>
            </div>
        </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <div class="lg:col-span-4 space-y-8">
            <div class="glass p-8 glow-card">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">📝 Note Lab</h2>
                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Topic Name</label>
                        <input type="text" id="noteTitle" placeholder="e.g. S3 Bucket Policy" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm focus:border-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Category</label>
                        <select id="noteCat" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm outline-none">
                            <option value="linux">Linux & Bash</option>
                            <option value="git">Git & GitHub</option>
                            <option value="python">Python Scripting</option>
                            <option value="docker">Docker Containers</option>
                            <option value="k8s">Kubernetes</option>
                            <option value="cicd">CI/CD (Jenkins/Actions)</option>
                            <option value="terraform">Terraform (IaC)</option>
                            <option value="aws">AWS Cloud</option>
                            <option value="monitoring">Monitoring (Grafana)</option>
                            <option value="custom">✨ Other / Custom Note</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Content</label>
                        <textarea id="noteText" rows="5" placeholder="Commands, steps or theory..." class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm outline-none"></textarea>
                    </div>
                    <button onclick="saveNote()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95">SAVE TO KNOWLEDGE BASE</button>
                </div>
            </div>

            <div class="glass p-6">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Revision Needed</h4>
                <div id="revisionList" class="space-y-3">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">Stored Notes</h3>
                <input type="text" id="searchNotes" onkeyup="filterNotes()" placeholder="Filter by keyword..." class="bg-slate-900 border border-slate-800 rounded-full px-4 py-1.5 text-xs outline-none focus:border-blue-500">
            </div>
            
            <div id="notesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>
    </div>

    <script>
        const dailyTasks = [
            "Linux: Use 'awk' to filter a text file.",
            "Git: Try 'git cherry-pick' to move a commit.",
            "Docker: Create a multi-stage Dockerfile.",
            "Python: Write a script to check website status.",
            "AWS: Create an IAM policy with Least Privilege.",
            "K8s: Deploy a Pod using a YAML manifest.",
            "CI/CD: Setup a basic GitHub Action workflow."
        ];

        function init() {
            document.getElementById('dailyMission').innerText = dailyTasks[new Date().getDate() % dailyTasks.length];
            renderNotes();
        }

        function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const cat = document.getElementById('noteCat').value;
            const text = document.getElementById('noteText').value;

            if(!title || !text) return alert("Kuch toh likho Mariya!");

            const note = { title, cat, text, id: Date.now(), date: new Date().toLocaleDateString() };
            let notes = JSON.parse(localStorage.getItem('devops_pro_v2') || '[]');
            notes.unshift(note);
            localStorage.setItem('devops_pro_v2', JSON.stringify(notes));

            document.getElementById('noteTitle').value = '';
            document.getElementById('noteText').value = '';
            renderNotes();
        }

        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const notes = JSON.parse(localStorage.getItem('devops_pro_v2') || '[]');
            grid.innerHTML = '';

            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = `glass p-6 theme-${n.cat} group hover:scale-[1.02] transition-all relative`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-bold text-slate-500 uppercase">${n.date}</span>
                        <button onclick="deleteNote(${n.id})" class="text-[10px] text-slate-600 hover:text-red-500 font-bold">DELETE</button>
                    </div>
                    <h4 class="font-bold text-white mb-2">${n.title}</h4>
                    <p class="text-xs text-slate-400 leading-relaxed line-clamp-4">${n.text}</p>
                    <div class="mt-6 flex justify-between items-center">
                        <span class="text-[9px] bg-black/40 px-2 py-1 rounded border border-slate-700 font-bold uppercase text-blue-400">${n.cat}</span>
                        <button onclick="copyText('${n.text.replace(/'/g, "\\'")}')" class="text-[10px] text-slate-500 hover:text-white">COPY CONTENT</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function deleteNote(id) {
            let notes = JSON.parse(localStorage.getItem('devops_pro_v2') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('devops_pro_v2', JSON.stringify(notes));
            renderNotes();
        }

        function filterNotes() {
            const q = document.getElementById('searchNotes').value.toLowerCase();
            document.querySelectorAll('#notesGrid > div').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt);
            alert("Copied to clipboard!");
        }

        window.onload = init;
    </script>
</body>
</html>
